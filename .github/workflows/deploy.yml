name: "[DISABLED] Old Deploy - Use deploy-azure.yml instead"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "This workflow is disabled. Use deploy-azure.yml instead."
        required: true
        default: "do-not-run"

jobs:
  disabled:
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "This workflow is disabled. Use deploy-azure.yml instead."

name: Deploy to Azure UK South

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_CONTAINER_APP: gorigo-app
  AZURE_RESOURCE_GROUP: gorigo-rg
  ACR_NAME: gorigoacr
  IMAGE_NAME: gorigo

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit || true

  build-and-push:
    name: Build & Push Container
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push container image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.meta.outputs.tag }}"

          docker build \
            --no-cache \
            --build-arg BUILD_DATE=$(date -u +%Y%m%d%H%M%S) \
            --build-arg COMMIT_SHA="${TAG}" \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  migrate:
    name: Run Database Migrations
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Push schema to database
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Azure Container Apps
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Ensure ACR registry credentials
        run: |
          az containerapp registry set \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --username "${{ secrets.ACR_USERNAME }}" \
            --password "${{ secrets.ACR_PASSWORD }}"

      - name: Set single-revision mode
        run: |
          az containerapp revision set-mode \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --mode single

      - name: Clean up stale env vars
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --remove-env-vars COMMIT_SHA BUILD_DATE 2>/dev/null || echo "Nothing to remove"

      - name: Ensure required env vars are set
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --set-env-vars \
              "DATABASE_URL=${{ secrets.DATABASE_URL }}" \
              "SESSION_SECRET=${{ secrets.SESSION_SECRET }}" \
              "NODE_ENV=production"

      - name: Deploy new container revision
        id: deploy-revision
        run: |
          DEPLOY_TS=$(date -u +%Y%m%d%H%M%S)
          SHORT_SHA=$(echo "${{ needs.build-and-push.outputs.image-tag }}" | cut -c1-7)
          SUFFIX="${SHORT_SHA}-${DEPLOY_TS}"
          echo "revision_suffix=${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "Deploying with revision suffix: ${SUFFIX}"
          echo "Image: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}"

          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}" \
            --revision-suffix "${SUFFIX}"

      - name: Wait for revision to provision
        run: sleep 30

      - name: Check revision readiness
        run: |
          REVISION="${{ env.AZURE_CONTAINER_APP }}--${{ steps.deploy-revision.outputs.revision_suffix }}"
          echo "Checking revision: ${REVISION}"

          READY_NAME=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.latestReadyRevisionName" -o tsv)
          LATEST_NAME=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.latestRevisionName" -o tsv)

          echo "Latest revision:       ${LATEST_NAME}"
          echo "Latest READY revision:  ${READY_NAME}"

          if [ "${LATEST_NAME}" != "${READY_NAME}" ]; then
            echo ""
            echo "ERROR: New revision is NOT ready! Container may have crashed."
            echo "Fetching container logs for diagnosis..."
            az containerapp logs show \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "${LATEST_NAME}" \
              --tail 100 2>/dev/null || echo "Could not fetch revision logs"

            echo ""
            echo "Fetching system logs..."
            az containerapp logs show \
              --name ${{ env.AZURE_CONTAINER_APP }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "${LATEST_NAME}" \
              --type system \
              --tail 50 2>/dev/null || echo "Could not fetch system logs"

            echo ""
            echo "::error::Revision ${LATEST_NAME} failed to become ready. Old revision ${READY_NAME} is still serving traffic."
            exit 1
          else
            echo "New revision is READY and serving traffic."
          fi

      - name: Verify active revision
        run: |
          echo "=== Active revisions ==="
          az containerapp revision list \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.active==\`true\`].{name:name, image:properties.template.containers[0].image, created:properties.createdTime, traffic:properties.trafficWeight}" \
            -o table

  healthcheck:
    name: Post-Deploy Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "app_url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Wait for container startup
        run: sleep 30

      - name: Health check
        run: |
          EXPECTED_SHA="${{ needs.build-and-push.outputs.image-tag }}"
          for i in 1 2 3 4 5 6; do
            RESPONSE=$(curl -s "${{ steps.get-url.outputs.app_url }}/api/health" --max-time 10 || echo "{}")
            STATUS=$(echo "$RESPONSE" | jq -r '.status // "unknown"' 2>/dev/null || echo "unknown")
            COMMIT=$(echo "$RESPONSE" | jq -r '.commit // "unknown"' 2>/dev/null || echo "unknown")

            echo "Attempt $i/6: status=$STATUS commit=$COMMIT"

            if [ "$STATUS" = "healthy" ]; then
              echo "Health check PASSED"
              echo "App is live at: ${{ steps.get-url.outputs.app_url }}"
              echo "Running commit: $COMMIT"
              if [ "$COMMIT" = "$EXPECTED_SHA" ]; then
                echo "Commit SHA MATCHES expected deployment"
              else
                echo "WARNING: Commit SHA mismatch! Expected: $EXPECTED_SHA Got: $COMMIT"
                echo "The new revision may not be serving traffic yet."
              fi
              exit 0
            fi
            echo "Retrying in 15s..."
            sleep 15
          done
          echo "Health check FAILED after 6 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment health check failed for ${{ env.AZURE_CONTAINER_APP }}"
          echo "Check logs: az containerapp logs show --name ${{ env.AZURE_CONTAINER_APP }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}"

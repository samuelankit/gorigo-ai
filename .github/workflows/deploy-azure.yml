name: Deploy to Azure UK South

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_CONTAINER_APP: gorigo-app
  AZURE_RESOURCE_GROUP: gorigo-rg
  ACR_NAME: gorigoacr
  IMAGE_NAME: gorigo

permissions:
  contents: read
  id-token: write

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit || true

  build-and-push:
    name: Build & Push Container
    needs: lint
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push container image
        run: |
          IMAGE="${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.meta.outputs.tag }}"

          docker build \
            --build-arg NEXT_OUTPUT=standalone \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .

          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"

  migrate:
    name: Run Database Migrations
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Push schema to database
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy:
    name: Deploy to Azure Container Apps
    needs: [build-and-push, migrate]
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy container to Container App
        run: |
          az containerapp update \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image "${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}" \
            --registry-server "${{ secrets.ACR_LOGIN_SERVER }}" \
            --registry-username "${{ secrets.ACR_USERNAME }}" \
            --registry-password "${{ secrets.ACR_PASSWORD }}"

  healthcheck:
    name: Post-Deploy Health Check
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get Container App URL
        id: get-url
        run: |
          FQDN=$(az containerapp show \
            --name ${{ env.AZURE_CONTAINER_APP }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "app_url=https://${FQDN}" >> "$GITHUB_OUTPUT"

      - name: Wait for container startup
        run: sleep 30

      - name: Health check
        run: |
          for i in 1 2 3 4 5 6; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "${{ steps.get-url.outputs.app_url }}/api/health" \
              --max-time 10 || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed on attempt $i"
              echo "App is live at: ${{ steps.get-url.outputs.app_url }}"
              exit 0
            fi
            echo "Attempt $i/6: Status $STATUS, retrying in 15s..."
            sleep 15
          done
          echo "Health check failed after 6 attempts"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Deployment health check failed for ${{ env.AZURE_CONTAINER_APP }}"
          echo "Check logs: az containerapp logs show --name ${{ env.AZURE_CONTAINER_APP }} --resource-group ${{ env.AZURE_RESOURCE_GROUP }}"
